# Config docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 5
    labels: [dependencies]
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]
      development-dependencies:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 3
    labels: [github-actions]
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 3
    labels: [docker]
    commit-message:
      prefix: chore
      include: scope
